<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 18px 22px; box-sizing: border-box; font-family: var(--font-sans); display: flex; gap: 22px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .icon { display: block; box-shadow: var(--ev-2); }
  .lg  { width: 120px; height: 120px; border-radius: 26px; }
  .md  { width: 64px;  height: 64px;  border-radius: 14px; }
  .sm  { width: 40px;  height: 40px;  border-radius: 9px; }
  .xs  { width: 24px;  height: 24px;  border-radius: 5px; box-shadow: var(--ev-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .name { font-size: 11px; font-weight: 600; color: var(--fg); }
</style></head>
<body>
  <div class="col">
    <img class="icon lg" src="../assets/logo-icon.svg" alt="">
    <div class="name">App icon</div>
    <div class="meta">1024 · radius 22%</div>
  </div>
  <div class="col">
    <img class="icon md" src="../assets/logo-icon.svg" alt="">
    <div class="name">macOS dock</div>
    <div class="meta">64 · radius 22%</div>
  </div>
  <div class="col">
    <img class="icon sm" src="../assets/logo-icon.svg" alt="">
    <div class="name">Tab bar</div>
    <div class="meta">40 · radius 22%</div>
  </div>
  <div class="col">
    <img class="icon xs" src="../assets/logo-icon.svg" alt="">
    <div class="name">Favicon</div>
    <div class="meta">24 · radius 22%</div>
  </div>
</body></html>
