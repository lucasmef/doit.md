<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 28px 22px; box-sizing: border-box; font-family: var(--font-sans); display: flex; gap: 22px; align-items: center; justify-content: space-around; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 110px; height: 70px; background: var(--c-white); border: 1px solid var(--border); border-radius: var(--r-12); }
  .name { font-size: 12px; font-weight: 700; color: var(--fg); }
  .role { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style></head>
<body>
  <div class="item">
    <div class="box" style="box-shadow: none;"></div>
    <div class="name">Flat</div>
    <div class="role">--ev-0 · border only</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow: 0 1px 2px rgba(15,35,66,.06), 0 1px 1px rgba(15,35,66,.04);"></div>
    <div class="name">Card</div>
    <div class="role">--ev-1 · default</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow: 0 6px 16px rgba(15,35,66,.08), 0 2px 4px rgba(15,35,66,.04);"></div>
    <div class="name">Menu</div>
    <div class="role">--ev-2 · overlay</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow: 0 18px 40px rgba(15,35,66,.14), 0 4px 10px rgba(15,35,66,.06);"></div>
    <div class="name">Modal</div>
    <div class="role">--ev-3 · sheet</div>
  </div>
</body></html>
