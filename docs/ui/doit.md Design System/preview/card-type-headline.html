<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 24px 28px; box-sizing: border-box; font-family: var(--font-sans); }
  h1 { margin: 0 0 4px; font-weight: 800; font-size: 56px; letter-spacing: -.02em; line-height: 1; color: var(--fg); }
  h1 .grad { background: var(--brand-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { font-weight: 400; font-size: 18px; color: var(--fg-2); margin-top: 8px; max-width: 56ch; line-height: 1.45; }
</style></head>
<body>
  <h1>Markdown-first<br/><span class="grad">notes &amp; tasks.</span></h1>
  <div class="sub">Capture ideas, organize tasks, and ship progress with Markdown.</div>
</body></html>
