<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 20px; box-sizing: border-box; }
  .ramp { display: flex; gap: 0; border-radius: var(--r-12); overflow: hidden; border: 1px solid var(--border); }
  .step { flex: 1; padding: 16px 10px; display: flex; flex-direction: column; gap: 4px; min-height: 86px; }
  .step .name { font-size: 11px; font-weight: 700; }
  .step .hex { font-family: var(--font-mono); font-size: 10px; opacity: .85; }
  .light { color: white; }
  .dark { color: var(--fg); }
  .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--fg-2); margin-top: 12px; }
</style></head>
<body>
  <div class="ramp">
    <div class="step light" style="background:#0F2342"><div class="name">Navy 900</div><div class="hex">#0F2342</div></div>
    <div class="step light" style="background:#1F3559"><div class="name">Navy 700</div><div class="hex">#1F3559</div></div>
    <div class="step light" style="background:#46587A"><div class="name">Navy 500</div><div class="hex">#46587A</div></div>
    <div class="step light" style="background:#7B89A4"><div class="name">Navy 300</div><div class="hex">#7B89A4</div></div>
    <div class="step dark" style="background:#B6C2D2"><div class="name">Gray 200</div><div class="hex">#B6C2D2</div></div>
    <div class="step dark" style="background:#D9E1EA"><div class="name">Gray 100</div><div class="hex">#D9E1EA</div></div>
    <div class="step dark" style="background:#ECF0F5"><div class="name">Gray 50</div><div class="hex">#ECF0F5</div></div>
    <div class="step dark" style="background:#F8FAFC"><div class="name">Off White</div><div class="hex">#F8FAFC</div></div>
  </div>
  <div class="label">Cool neutrals — derived from navy ↔ cool gray. Never warm.</div>
</body></html>
