<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 22px; box-sizing: border-box; font-family: var(--font-sans); display: flex; flex-direction: column; gap: 14px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .04em; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .meter { width: 100%; height: 8px; border-radius: 999px; background: var(--c-gray-100); overflow: hidden; }
  .meter-fill { height: 100%; background: var(--brand-gradient); }
  .progress-block { display: flex; flex-direction: column; gap: 8px; }
  .progress-head { display: flex; justify-content: space-between; font-size: 13px; }
  .progress-head .pct { font-family: var(--font-mono); color: var(--fg-2); }
  .ring { width: 56px; height: 56px; }
  .stat { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--c-white); border: 1px solid var(--border); border-radius: var(--r-12); flex: 1; }
  .stat .num { font-weight: 800; font-size: 24px; letter-spacing: -.02em; color: var(--fg); line-height: 1; }
  .stat .lbl { font-size: 12px; color: var(--fg-2); margin-top: 4px; }
</style></head>
<body>
  <div class="progress-block">
    <div class="progress-head"><span style="font-weight:600">Today's tasks</span><span class="pct">7 / 12 · 58%</span></div>
    <div class="meter"><div class="meter-fill" style="width: 58%"></div></div>
  </div>
  <div class="row">
    <div class="stat">
      <svg class="ring" viewBox="0 0 56 56">
        <defs><linearGradient id="rg" x1="0" y1="0" x2="56" y2="56"><stop offset="0" stop-color="#2F6BFF"/><stop offset="1" stop-color="#28C7B7"/></linearGradient></defs>
        <circle cx="28" cy="28" r="22" fill="none" stroke="#D9E1EA" stroke-width="6"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="url(#rg)" stroke-width="6" stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="55" transform="rotate(-90 28 28)"/>
      </svg>
      <div><div class="num">12</div><div class="lbl">Day streak</div></div>
    </div>
    <div class="stat">
      <svg class="ring" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#D9E1EA" stroke-width="6"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="#2F6BFF" stroke-width="6" stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="98" transform="rotate(-90 28 28)"/>
      </svg>
      <div><div class="num">28%</div><div class="lbl">This week</div></div>
    </div>
    <div class="stat">
      <svg class="ring" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#D9E1EA" stroke-width="6"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="#28C7B7" stroke-width="6" stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="0" transform="rotate(-90 28 28)"/>
      </svg>
      <div><div class="num">100%</div><div class="lbl">Inbox zero</div></div>
    </div>
  </div>
</body></html>
