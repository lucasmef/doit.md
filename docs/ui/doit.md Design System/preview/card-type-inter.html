<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { padding: 22px 24px; box-sizing: border-box; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .name { font-family: var(--font-sans); font-weight: 800; font-size: 56px; letter-spacing: -.02em; color: var(--fg); line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
  .specimen { margin-top: 14px; font-family: var(--font-sans); font-weight: 800; font-size: 30px; letter-spacing: -.02em; line-height: 1.1; color: var(--fg); }
  .weights { display: flex; gap: 18px; margin-top: 14px; font-family: var(--font-sans); }
  .w { font-size: 18px; color: var(--fg); }
  .w span { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); margin-top: 2px; font-weight: 400; }
</style></head>
<body>
  <div class="row">
    <div class="name">Inter</div>
    <div class="meta">UI · Headings · Body</div>
  </div>
  <div class="specimen">Build clarity. Ship progress.</div>
  <div class="weights">
    <div class="w" style="font-weight:400">Aa<span>400 Regular</span></div>
    <div class="w" style="font-weight:500">Aa<span>500 Medium</span></div>
    <div class="w" style="font-weight:600">Aa<span>600 Semibold</span></div>
    <div class="w" style="font-weight:700">Aa<span>700 Bold</span></div>
    <div class="w" style="font-weight:800">Aa<span>800 Black</span></div>
  </div>
</body></html>
