<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>doit.md — capture modal</title>
<meta name="viewport" content="width=1440, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     doit.md — capture modal (Tarefa / Nota / Evento)
     ============================================================ */
  :root {
    --c-navy:    #0F2342;
    --c-blue:    #2F6BFF;
    --c-blue-50: #EAF1FF;
    --c-blue-100:#D7E3FF;
    --c-teal:    #28C7B7;
    --c-violet:  #7B5BFF;
    --c-pink:    #FF6FAE;
    --c-amber:   #F5A524;

    --c-gray-50:  #F4F6FA;
    --c-gray-100: #E6EBF3;
    --c-gray-200: #C9D2DF;
    --c-gray-300: #A8B3C4;
    --c-gray-500: #5C6B86;
    --c-gray-700: #2A3C5C;

    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

    --r-card:  24px;
    --r-input: 12px;
    --r-pill:  999px;

    --shadow-modal:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 -1px 0 rgba(15,35,66,.04) inset,
      0 30px 80px -20px rgba(15,35,66,.30),
      0 14px 30px -10px rgba(15,35,66,.18);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    color: var(--c-navy);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ============== backdrop (blurred dashboard) ============== */
  .backdrop {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(900px 700px at 12% 20%, rgba(123,91,255,.55), transparent 60%),
      radial-gradient(800px 600px at 88% 14%, rgba(255,137,235,.42), transparent 62%),
      radial-gradient(900px 800px at 78% 78%, rgba(40,199,183,.50), transparent 60%),
      radial-gradient(1000px 900px at 18% 95%, rgba(47,107,255,.55), transparent 62%),
      linear-gradient(135deg, #B7C9FF 0%, #DDD6FE 35%, #FBC9F0 60%, #CFF3EE 100%);
  }
  .backdrop::after {
    content: "";
    position: absolute; inset: 0;
    background:
      linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px) 0 0 / 64px 64px,
      linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px) 0 0 / 64px 64px,
      rgba(15,35,66,.18);
    mask-image: radial-gradient(circle at center, black, transparent 80%);
  }
  /* faint card silhouettes to suggest dashboard underneath */
  .backdrop-cards {
    position: fixed; inset: 0; z-index: 1;
    display: grid; grid-template-columns: repeat(12, 1fr); gap: 18px;
    padding: 28px 36px;
    pointer-events: none;
    filter: blur(8px);
    opacity: .55;
  }
  .bd { background: rgba(255,255,255,.65); border: 1px solid rgba(255,255,255,.7); border-radius: 28px; }
  .bd.a { grid-column: span 4; height: 220px; }
  .bd.b { grid-column: span 4; height: 220px; }
  .bd.c { grid-column: span 4; height: 220px; }
  .bd.d { grid-column: span 8; height: 280px; }
  .bd.e { grid-column: span 4; height: 280px; }

  /* dim layer */
  .scrim {
    position: fixed; inset: 0; z-index: 5;
    background: rgba(15,35,66,.28);
    backdrop-filter: blur(2px);
  }

  /* ============== label strip ============== */
  .label {
    position: fixed; top: 24px; left: 36px;
    z-index: 100;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    background: rgba(255,255,255,.7);
    border: 1px solid rgba(255,255,255,.7);
    border-radius: var(--r-pill);
    backdrop-filter: blur(14px);
    font-family: var(--font-mono); font-size: 11.5px;
    color: var(--c-gray-500);
    letter-spacing: .04em;
  }
  .label .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--c-teal); box-shadow: 0 0 6px var(--c-teal); }

  /* state switcher (above modal — for demo only) */
  .demo-switch {
    position: fixed; top: 24px; right: 36px;
    z-index: 100;
    display: inline-flex; gap: 4px;
    padding: 4px;
    background: rgba(15,35,66,.85);
    border-radius: var(--r-pill);
    backdrop-filter: blur(14px);
  }
  .demo-switch button {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
    color: rgba(255,255,255,.65);
    background: transparent; border: 0;
    padding: 7px 14px; border-radius: var(--r-pill);
    cursor: pointer;
    letter-spacing: .06em; text-transform: uppercase;
  }
  .demo-switch button.active {
    background: white; color: var(--c-navy);
  }

  /* ============== modal shell ============== */
  .modal-wrap {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 80px 24px 60px;
  }
  .modal {
    width: 560px;
    background: rgba(255,255,255,.94);
    border: 1px solid rgba(255,255,255,.9);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-modal);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    overflow: hidden;
  }

  /* tabs */
  .tabs {
    padding: 14px 14px 0;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 2px;
    background: var(--c-gray-50);
    border-bottom: 1px solid rgba(15,35,66,.06);
  }
  .tab {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 10px;
    border-radius: 12px 12px 0 0;
    cursor: pointer;
    font-size: 14px; font-weight: 600;
    color: var(--c-gray-500);
    transition: background .15s, color .15s;
    position: relative;
  }
  .tab svg { width: 17px; height: 17px; }
  .tab:hover { color: var(--c-navy); }
  .tab.active {
    background: white;
    color: var(--c-blue);
    box-shadow: 0 -1px 0 rgba(15,35,66,.06);
  }
  .tab.active::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 12px; right: 12px;
    height: 2px;
    background: linear-gradient(90deg, var(--c-blue), var(--c-teal));
    border-radius: 2px 2px 0 0;
  }

  /* body + footer base */
  .body { padding: 22px 24px 18px; background: white; }
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-top: 1px solid rgba(15,35,66,.06);
    background: linear-gradient(180deg, rgba(244,246,250,.6), rgba(244,246,250,1));
  }
  .footer-left { display: inline-flex; align-items: center; gap: 12px; }
  .footer-right { display: inline-flex; align-items: center; gap: 8px; }

  /* common controls */
  .field-label {
    display: block;
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
    color: var(--c-gray-500); letter-spacing: .12em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .input, .textarea, .select-native, .input-time, .input-date {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--r-input);
    border: 1.5px solid var(--c-gray-100);
    background: white;
    color: var(--c-navy);
    font-family: var(--font-sans); font-size: 14px;
    transition: border-color .15s, box-shadow .15s, background .15s;
    outline: none;
  }
  .input:hover, .textarea:hover, .input-time:hover, .input-date:hover {
    border-color: var(--c-gray-200);
  }
  .input:focus, .textarea:focus, .select-native:focus, .input-time:focus, .input-date:focus {
    border-color: var(--c-blue);
    box-shadow: 0 0 0 4px rgba(47,107,255,.12);
  }
  .input::placeholder, .textarea::placeholder {
    color: var(--c-gray-300);
    font-weight: 500;
  }
  .input.title {
    font-size: 18px; font-weight: 600; letter-spacing: -.01em;
    padding: 14px 16px;
  }
  .textarea {
    resize: vertical; min-height: 80px;
    font-size: 13.5px; line-height: 1.5;
  }
  .textarea.flat {
    border: 0; padding: 4px 0;
    min-height: 32px;
    font-size: 13.5px;
    color: var(--c-navy);
  }
  .textarea.flat:focus { box-shadow: none; }
  .textarea.flat::placeholder { color: var(--c-gray-300); }

  /* chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 12px;
    background: var(--c-gray-50);
    border: 1px solid transparent;
    border-radius: var(--r-pill);
    font-size: 13px; font-weight: 600;
    color: var(--c-gray-500);
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .chip svg { width: 14px; height: 14px; }
  .chip:hover { background: var(--c-gray-100); color: var(--c-navy); }
  .chip.active {
    background: var(--c-blue-50);
    color: var(--c-blue);
    border-color: var(--c-blue-100);
  }
  .chip.icon-only { padding: 8px 10px; }

  /* button */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 18px;
    border-radius: var(--r-pill);
    font-size: 14px; font-weight: 600;
    border: 0; cursor: pointer;
    font-family: inherit;
    transition: background .15s, color .15s, transform .05s;
  }
  .btn:active { transform: translateY(1px); }
  .btn.ghost {
    background: transparent;
    color: var(--c-gray-500);
  }
  .btn.ghost:hover { color: var(--c-navy); background: rgba(15,35,66,.04); }
  .btn.primary {
    background: linear-gradient(135deg, var(--c-blue), #4F4BE9);
    color: white;
    box-shadow: 0 4px 12px -2px rgba(47,107,255,.4), 0 0 0 1px rgba(47,107,255,.2) inset;
  }
  .btn.primary:hover {
    background: linear-gradient(135deg, #2A5FE6, #4541D6);
  }
  .btn.primary.disabled {
    background: var(--c-blue-100);
    color: rgba(255,255,255,.85);
    box-shadow: none;
    cursor: not-allowed;
  }

  /* folder selector */
  .folder-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 10px 6px 6px;
    background: transparent;
    border: 0; border-radius: var(--r-pill);
    font-size: 13px; font-weight: 500; color: var(--c-gray-500);
    cursor: pointer;
    font-family: inherit;
  }
  .folder-btn:hover { background: var(--c-gray-50); color: var(--c-navy); }
  .folder-btn .ic {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--c-gray-100);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--c-gray-500);
  }
  .folder-btn .ic svg { width: 13px; height: 13px; }
  .folder-btn .path {
    font-family: var(--font-mono); font-size: 11.5px;
    color: var(--c-gray-500);
  }
  .folder-btn .path b { color: var(--c-navy); font-weight: 600; }

  /* state body containers */
  .state { display: none; }
  .state.active { display: block; }

  /* ============== TAREFA state ============== */
  .task-title-wrap {
    position: relative;
    padding-bottom: 4px;
    margin-bottom: 14px;
    border-bottom: 1.5px solid var(--c-gray-100);
    transition: border-color .15s;
  }
  .task-title-wrap:focus-within { border-color: var(--c-blue); }
  .task-title {
    width: 100%; border: 0; padding: 10px 0 6px;
    font-family: inherit;
    font-size: 22px; font-weight: 600;
    color: var(--c-navy);
    letter-spacing: -.015em;
    outline: none;
    background: transparent;
  }
  .task-title::placeholder { color: var(--c-gray-300); font-weight: 500; }
  .task-desc {
    width: 100%; border: 0; padding: 6px 0 10px;
    font-family: inherit;
    font-size: 14px; line-height: 1.5; color: var(--c-gray-700);
    outline: none; resize: none;
    background: transparent;
    min-height: 44px;
  }
  .task-desc::placeholder { color: var(--c-gray-300); }
  .grow-handle {
    position: absolute; right: 0; bottom: 4px;
    color: var(--c-gray-200);
    pointer-events: none;
  }
  .task-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 4px;
  }

  /* ============== EVENTO state ============== */
  .field { margin-bottom: 14px; }
  .field.row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* checkbox */
  .check {
    display: inline-flex; align-items: center; gap: 9px;
    cursor: pointer;
    font-size: 13.5px; font-weight: 600; color: var(--c-navy);
    user-select: none;
  }
  .check input { display: none; }
  .check .box {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--c-gray-200);
    background: white;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .check .box svg { width: 12px; height: 12px; color: white; opacity: 0; }
  .check input:checked + .box {
    background: var(--c-blue);
    border-color: var(--c-blue);
  }
  .check input:checked + .box svg { opacity: 1; }

  /* date / time input with icon */
  .pick {
    position: relative;
  }
  .pick .input {
    font-family: var(--font-mono); font-size: 14px;
    padding-right: 40px;
  }
  .pick .pick-ic {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--c-gray-500);
    pointer-events: none;
  }
  .pick .pick-ic svg { width: 17px; height: 17px; }

  /* time quick chips */
  .time-quick {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 4px 0 14px;
  }
  .time-chip {
    padding: 10px;
    text-align: center;
    background: var(--c-gray-50);
    border: 1.5px solid transparent;
    border-radius: 10px;
    font-family: var(--font-mono); font-size: 13px; font-weight: 600;
    color: var(--c-gray-500);
    cursor: pointer;
    transition: all .15s;
  }
  .time-chip:hover { background: var(--c-gray-100); color: var(--c-navy); }
  .time-chip.active {
    background: var(--c-blue);
    color: white;
    border-color: var(--c-blue);
    box-shadow: 0 4px 10px -2px rgba(47,107,255,.4);
  }

  /* visibility select */
  .visibility {
    display: inline-flex; align-items: center; gap: 10px;
  }
  .select {
    position: relative;
  }
  .select select {
    appearance: none;
    -webkit-appearance: none;
    padding: 8px 30px 8px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--c-gray-100);
    background: white;
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--c-navy);
    cursor: pointer;
    outline: none;
  }
  .select select:hover { border-color: var(--c-gray-200); }
  .select::after {
    content: "";
    position: absolute; right: 10px; top: 50%;
    width: 7px; height: 7px;
    border-right: 1.5px solid var(--c-gray-500);
    border-bottom: 1.5px solid var(--c-gray-500);
    transform: translateY(-70%) rotate(45deg);
    pointer-events: none;
  }
  .duration-badge {
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    color: var(--c-gray-500);
    background: var(--c-gray-50);
    padding: 6px 10px; border-radius: var(--r-pill);
    letter-spacing: .06em;
  }

  /* ============== NOTA state ============== */
  .note-title {
    width: 100%; border: 0; padding: 8px 0;
    font-family: inherit;
    font-size: 24px; font-weight: 700;
    color: var(--c-navy);
    letter-spacing: -.02em;
    outline: none; background: transparent;
    border-bottom: 1.5px solid var(--c-gray-100);
    margin-bottom: 12px;
    transition: border-color .15s;
  }
  .note-title:focus { border-color: var(--c-blue); }
  .note-title::placeholder { color: var(--c-gray-300); font-weight: 500; }
  .note-body {
    width: 100%; border: 0; padding: 0;
    font-family: inherit;
    font-size: 14px; line-height: 1.55;
    color: var(--c-gray-700);
    outline: none; resize: vertical;
    background: transparent;
    min-height: 160px;
  }
  .note-body::placeholder { color: var(--c-gray-300); }
  .note-toolbar {
    display: flex; gap: 4px; flex-wrap: wrap;
    padding: 8px 0 12px;
    border-bottom: 1px solid var(--c-gray-100);
    margin-bottom: 12px;
  }
  .tool-btn {
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 0;
    border-radius: 6px;
    color: var(--c-gray-500);
    cursor: pointer;
  }
  .tool-btn:hover { background: var(--c-gray-50); color: var(--c-navy); }
  .tool-btn.active { background: var(--c-blue-50); color: var(--c-blue); }
  .tool-btn svg { width: 15px; height: 15px; }
  .tool-divider { width: 1px; background: var(--c-gray-100); margin: 4px 4px; }

  /* keyboard hint */
  .kbd-hint {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--c-gray-300);
    margin-right: 6px;
  }
  .kbd-hint .kbd {
    display: inline-block; padding: 1px 5px;
    background: var(--c-gray-50);
    border: 1px solid var(--c-gray-100);
    border-radius: 4px;
    color: var(--c-gray-500);
  }

  /* small mute */
  .muted { color: var(--c-gray-300); font-size: 13px; }

  /* dropdown previews (Hoje chip preview) */
  .pop {
    position: absolute;
    left: 0; top: calc(100% + 6px);
    background: white;
    border: 1px solid var(--c-gray-100);
    border-radius: 12px;
    padding: 6px;
    box-shadow: 0 14px 32px -10px rgba(15,35,66,.20);
    z-index: 20;
    min-width: 200px;
    display: none;
  }
  .pop.open { display: block; }
  .pop button {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; width: 100%;
    padding: 8px 10px;
    border: 0; background: transparent;
    border-radius: 8px;
    font-family: inherit; font-size: 13px;
    color: var(--c-navy); cursor: pointer; text-align: left;
  }
  .pop button:hover { background: var(--c-gray-50); }
  .pop button .kbd { font-family: var(--font-mono); font-size: 10.5px; color: var(--c-gray-300); }
  .pop .div { height: 1px; background: var(--c-gray-100); margin: 4px 2px; }

  .chip-wrap { position: relative; }
</style>
</head>
<body>

<div class="backdrop" aria-hidden="true"></div>
<div class="backdrop-cards" aria-hidden="true">
  <div class="bd a"></div><div class="bd b"></div><div class="bd c"></div>
  <div class="bd d"></div><div class="bd e"></div>
</div>
<div class="scrim" aria-hidden="true"></div>

<div class="label"><span class="dot"></span>capture modal · ⌘N</div>

<div class="demo-switch" role="tablist">
  <button class="demo active" data-state="task">Tarefa</button>
  <button class="demo" data-state="note">Nota</button>
  <button class="demo" data-state="event">Evento</button>
</div>

<div class="modal-wrap">
  <div class="modal" role="dialog" aria-label="Capture">

    <!-- ============== TABS ============== -->
    <div class="tabs" role="tablist">
      <div class="tab active" data-tab="task">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>
        Tarefa
      </div>
      <div class="tab" data-tab="note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>
        Nota
      </div>
      <div class="tab" data-tab="event">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Evento
      </div>
    </div>

    <!-- ============================================================
         STATE: TAREFA
         ============================================================ -->
    <div class="state state-task active">
      <div class="body">
        <div class="task-title-wrap">
          <input class="task-title" type="text" placeholder="Nome da tarefa" autocomplete="off">
          <textarea class="task-desc" placeholder="Descrição (suporta markdown)" rows="2"></textarea>
          <svg class="grow-handle" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 9l6-6M6 9l3-3"/></svg>
        </div>

        <div class="task-chips">
          <!-- date chip -->
          <div class="chip-wrap">
            <button class="chip active" id="dateChip">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              Hoje
            </button>
            <div class="pop" id="datePop">
              <button>Hoje <span class="kbd">T</span></button>
              <button>Amanhã <span class="kbd">A</span></button>
              <button>Próxima segunda <span class="kbd">P</span></button>
              <div class="div"></div>
              <button>Sem data <span class="kbd">X</span></button>
              <button>Personalizar… <span class="kbd">/</span></button>
            </div>
          </div>

          <!-- repeat -->
          <button class="chip icon-only" title="Repetir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
          </button>

          <!-- priority / flag -->
          <button class="chip icon-only" title="Prioridade">

          </button>

          <!-- tag -->
          <button class="chip icon-only" title="Etiqueta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.18 7.18a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.83z"/><circle cx="7" cy="7" r="1.4"/></svg>
          </button>

          <!-- assignee -->
          <button class="chip icon-only" title="Atribuir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
          </button>
        </div>
      </div>

      <div class="footer">
        <div class="footer-left">
          <button class="folder-btn">
            <span class="ic">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            </span>
            <span class="path"><b>Caixa de entrada</b></span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
        </div>
        <div class="footer-right">
          <span class="kbd-hint"><span class="kbd">Esc</span></span>
          <button class="btn ghost">Cancelar</button>
          <button class="btn primary disabled">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Adicionar
          </button>
        </div>
      </div>
    </div>

    <!-- ============================================================
         STATE: NOTA
         ============================================================ -->
    <div class="state state-note">
      <div class="body">
        <input class="note-title" type="text" placeholder="Título da nota" autocomplete="off">

        <div class="note-toolbar">
          <button class="tool-btn" title="Heading"><span style="font-weight:800; font-size:13px;">H</span></button>
          <button class="tool-btn" title="Bold"><span style="font-weight:900;">B</span></button>
          <button class="tool-btn" title="Italic"><span style="font-style:italic; font-weight:700;">I</span></button>
          <button class="tool-btn" title="Strike"><span style="text-decoration:line-through; font-weight:700;">S</span></button>
          <div class="tool-divider"></div>
          <button class="tool-btn" title="Lista"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
          <button class="tool-btn" title="Checklist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 7 2 2 4-4"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8M13 18h8M13 12h8"/></svg></button>
          <button class="tool-btn" title="Quote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2-2-2H4c-1.25 0-2 .75-2 2v6c0 1.25.75 2 2 2h2"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.75-2-2-2h-4c-1.25 0-2 .75-2 2v6c0 1.25.75 2 2 2h2"/></svg></button>
          <button class="tool-btn" title="Code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg></button>
          <div class="tool-divider"></div>
          <button class="tool-btn" title="Link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
          <button class="tool-btn" title="Anexo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
        </div>

        <textarea class="note-body" placeholder="Comece a escrever… use # para títulos, - para listas, [ ] para checklist."></textarea>
      </div>

      <div class="footer">
        <div class="footer-left">
          <button class="folder-btn">
            <span class="ic">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            </span>
            <span class="path">notes / <b>quick</b></span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <span class="muted" style="font-family: var(--font-mono); font-size: 11px;">.md</span>
        </div>
        <div class="footer-right">
          <span class="kbd-hint"><span class="kbd">⌘</span> <span class="kbd">↵</span></span>
          <button class="btn ghost">Cancelar</button>
          <button class="btn primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
            Salvar
          </button>
        </div>
      </div>
    </div>

    <!-- ============================================================
         STATE: EVENTO
         ============================================================ -->
    <div class="state state-event">
      <div class="body">
        <div class="field">
          <label class="field-label">Título</label>
          <input class="input title" type="text" placeholder="Evento hoje às 14h" autocomplete="off">
        </div>

        <div class="field" style="display:flex; align-items:center; justify-content:space-between;">
          <label class="check">
            <input type="checkbox" id="allDay">
            <span class="box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>
            </span>
            Dia todo
          </label>
          <span class="muted" style="font-family: var(--font-mono); font-size: 11px; color: var(--c-gray-500);">TUE · 26 MAY 2026</span>
        </div>

        <div class="field row">
          <div>
            <label class="field-label">Início</label>
            <div class="pick">
              <input class="input" type="text" value="26/05/2026">
              <span class="pick-ic">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              </span>
            </div>
          </div>
          <div>
            <label class="field-label">Fim</label>
            <div class="pick">
              <input class="input" type="text" value="26/05/2026">
              <span class="pick-ic">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              </span>
            </div>
          </div>
        </div>

        <div class="field row">
          <div>
            <label class="field-label">Hora início</label>
            <div class="pick">
              <input class="input" type="text" value="09:00">
              <span class="pick-ic">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              </span>
            </div>
          </div>
          <div>
            <label class="field-label">Hora fim</label>
            <div class="pick">
              <input class="input" type="text" value="09:30">
              <span class="pick-ic">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              </span>
            </div>
          </div>
        </div>

        <div class="time-quick">
          <button class="time-chip active">09:00</button>
          <button class="time-chip">12:00</button>
          <button class="time-chip">14:00</button>
          <button class="time-chip">18:00</button>
        </div>

        <div class="field" style="margin-bottom: 0;">
          <label class="field-label">Descrição</label>
          <textarea class="textarea" placeholder="Local, pauta, link da call…"></textarea>
        </div>
      </div>

      <div class="footer">
        <div class="footer-left">
          <div class="visibility">
            <div class="select">
              <select>
                <option>Particular</option>
                <option>Time</option>
                <option>Público</option>
              </select>
            </div>
            <span class="duration-badge">30 MIN</span>
          </div>
        </div>
        <div class="footer-right">
          <span class="kbd-hint"><span class="kbd">⌘</span> <span class="kbd">↵</span></span>
          <button class="btn ghost">Cancelar</button>
          <button class="btn primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Criar
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ---------- tab switching (inside modal) ----------
  const tabs = document.querySelectorAll('.tabs .tab');
  const states = document.querySelectorAll('.state');
  const demos = document.querySelectorAll('.demo-switch .demo');

  function setState(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    states.forEach(s => s.classList.toggle('active', s.classList.contains('state-' + name)));
    demos.forEach(d => d.classList.toggle('active', d.dataset.state === name));
  }
  tabs.forEach(t => t.addEventListener('click', () => setState(t.dataset.tab)));
  demos.forEach(d => d.addEventListener('click', () => setState(d.dataset.state)));

  // ---------- enable primary button on task type ----------
  const taskTitle = document.querySelector('.task-title');
  const taskBtn = document.querySelector('.state-task .btn.primary');
  taskTitle.addEventListener('input', () => {
    taskBtn.classList.toggle('disabled', taskTitle.value.trim() === '');
  });

  // ---------- date chip popover ----------
  const dateChip = document.getElementById('dateChip');
  const datePop = document.getElementById('datePop');
  dateChip.addEventListener('click', (e) => {
    e.stopPropagation();
    datePop.classList.toggle('open');
  });
  document.addEventListener('click', () => datePop.classList.remove('open'));

  // ---------- time-quick chips ----------
  document.querySelectorAll('.time-chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.time-chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
    });
  });
</script>

</body>
</html>
