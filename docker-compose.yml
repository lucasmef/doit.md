services:
  postgres:
    image: postgres:16-alpine
    container_name: doitmd-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: doitmd
      POSTGRES_USER: doitmd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doitmd}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - doitmd-net

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: doitmd-web:latest
    container_name: doitmd-app
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://doitmd:doitmd@postgres:5432/doitmd}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    expose:
      - "3000"
    networks:
      - doitmd-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: doitmd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - doitmd-net

networks:
  doitmd-net:
    driver: bridge

volumes:
  nginx-cache:
  postgres-data:
