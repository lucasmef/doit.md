# Private development host for Doit.
# This must only be exposed on the Tailscale interface.
# Expected access URL: https://salomao-vps.tail2033b8.ts.net:8444

server {
    listen 100.81.12.64:8444 ssl;
    listen [fd7a:115c:a1e0::6236:c40]:8444 ssl;
    server_name salomao-vps.tail2033b8.ts.net;

    ssl_certificate /etc/nginx/ssl/salomao-vps.tail2033b8.ts.net.crt;
    ssl_certificate_key /etc/nginx/ssl/salomao-vps.tail2033b8.ts.net.key;

    allow 100.64.0.0/10;
    deny all;
    error_page 403 =404 /denied;
    location = /denied { internal; return 404; }

    client_max_body_size 10m;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:8111;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /sw.js {
        proxy_pass http://127.0.0.1:8111;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        proxy_pass http://127.0.0.1:8111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
