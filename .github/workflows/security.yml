name: Security

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    # Toda segunda às 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Dependency Audit
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Audit (high severity)
        run: corepack pnpm audit --audit-level high

  scan-secrets:
    name: Secret Scan
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret pattern scan
        run: |
          if git grep -n -I -E '(sk_live_|sk_test_|pk_live_|pk_test_|GOCSPX-|mongodb\\+srv://[^[:space:]]+:[^[:space:]@]+@)' -- ':!*.example' ':!pnpm-lock.yaml' ':!.github/workflows/security.yml'; then
            echo "Potential committed secret found."
            exit 1
          fi
