name: Security

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [dev, main]
  schedule:
    # Toda segunda às 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Audit (high severity)
        run: corepack pnpm audit --audit-level high

  scan-secrets:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret pattern scan
        run: |
          SECRET_PATTERN='(s[k]_live_|s[k]_test_|p[k]_live_|p[k]_test_|GOCSP[X]-|mongo[d]b\+srv://[^[:space:]]+:[^[:space:]@]+@)'
          if git grep -n -I -E "$SECRET_PATTERN" -- ':!*.example' ':!pnpm-lock.yaml'; then
            echo "Potential committed secret found."
            exit 1
          fi
