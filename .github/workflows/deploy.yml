name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/clarity

            echo "→ Atualizando código..."
            git pull origin master

            echo "→ Reconstruindo imagem..."
            docker compose build --no-cache app \
              --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

            echo "→ Subindo novo container..."
            docker compose up -d --no-deps app

            echo "→ Aguardando health check..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' clarity-app 2>/dev/null || echo "starting")
              echo "  [$i/12] $STATUS"
              if [ "$STATUS" = "healthy" ]; then break; fi
              if [ "$i" = "12" ]; then echo "❌ Health check falhou"; exit 1; fi
              sleep 10
            done

            echo "→ Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído!"
