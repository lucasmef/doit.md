name: Quality

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [dev, main]

jobs:
  quality:
    name: Type Check, Lint & Build
    # Roda no runner da própria VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Type Check
        run: corepack pnpm --filter @doit/web exec tsc --noEmit

      - name: Lint
        run: bash scripts/lint-incremental.sh

      - name: Build
        run: bash scripts/with-build-env.sh ci corepack pnpm --filter @doit/web build
