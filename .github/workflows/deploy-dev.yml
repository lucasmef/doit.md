name: Deploy DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: doit-deploy-dev
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @doit/web exec tsc --noEmit
      - run: bash scripts/lint-incremental.sh
      - run: bash scripts/with-build-env.sh dev corepack pnpm --filter @doit/web build

  security:
    name: Security Gate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm audit --audit-level high

  scan-secrets:
    name: Secret Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret pattern scan
        run: |
          if git grep -n -I -E '(sk_live_|sk_test_|pk_live_|pk_test_|GOCSPX-|mongodb\+srv://[^[:space:]]+:[^[:space:]@]+@)' -- ':!*.example' ':!pnpm-lock.yaml' ':!.github/workflows/deploy-dev.yml'; then
            echo "Potential committed secret found."
            exit 1
          fi

  deploy:
    name: Deploy DEV
    needs: [quality, security, scan-secrets]
    runs-on: self-hosted

    steps:
      - name: Checkout branch dev
        uses: actions/checkout@v4
        with:
          ref: dev
          clean: true

      - name: Sincronizar checkout dev no VPS
        run: |
          install -d /srv/doit/dev/app
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='apps/web/.env.local' \
            --exclude='node_modules' \
            --exclude='apps/web/node_modules' \
            --exclude='.next' \
            --exclude='apps/web/.next' \
            "$GITHUB_WORKSPACE/" /srv/doit/dev/app/

      - name: Executar script de deploy
        run: bash /srv/doit/dev/app/scripts/deploy.sh dev
