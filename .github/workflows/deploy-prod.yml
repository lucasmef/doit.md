name: Deploy PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: doit-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy PROD
    runs-on: self-hosted

    steps:
      - name: Checkout branch main para PROD
        uses: actions/checkout@v4
        with:
          ref: main
          clean: true
          fetch-depth: 0

      - name: Validar checkout de main
        run: |
          if [ "$(git rev-parse HEAD)" != "${{ github.sha }}" ]; then
            echo "O checkout de main nao corresponde ao commit do workflow."
            exit 1
          fi

      - name: Sincronizar /srv/doit/prod/app com codigo do main
        run: |
          install -d /srv/doit/prod/app
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='apps/web/.env.local' \
            --exclude='node_modules' \
            --exclude='apps/web/node_modules' \
            --exclude='.next' \
            --exclude='apps/web/.next' \
            "$GITHUB_WORKSPACE/" /srv/doit/prod/app/

      - name: Executar script de deploy
        run: bash /srv/doit/prod/app/scripts/deploy.sh prod

      - name: Criar tag de release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '.')
            const tag = `prod-${date}-r${{ github.run_number }}`
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: '${{ github.sha }}',
            })
            core.notice(`Tag criada: ${tag}`)
