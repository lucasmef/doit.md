name: Deploy PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: doit-deploy-prod
  cancel-in-progress: false

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @doit/web exec tsc --noEmit
      - run: bash scripts/lint-incremental.sh
      - run: bash scripts/with-build-env.sh ci corepack pnpm --filter @doit/web build

  security:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm audit --audit-level high

  scan-secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Secret pattern scan
        run: |
          SECRET_PATTERN='(s[k]_live_|s[k]_test_|p[k]_live_|p[k]_test_|GOCSP[X]-|mongo[d]b\+srv://[^[:space:]]+:[^[:space:]@]+@)'
          if git grep -n -I -E "$SECRET_PATTERN" -- ':!*.example' ':!pnpm-lock.yaml'; then
            echo "Potential committed secret found."
            exit 1
          fi

  resolve-sha:
    name: Resolve main SHA
    needs: [quality, security, scan-secrets]
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Checkout branch main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve deployed SHA
        id: resolve
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy PROD
    needs: resolve-sha
    runs-on: self-hosted

    steps:
      - name: Checkout branch main para PROD
        uses: actions/checkout@v4
        with:
          ref: main
          clean: true

      - name: Validar commit promovido
        run: |
          if [ "$(git rev-parse HEAD)" != "${{ needs.resolve-sha.outputs.sha }}" ]; then
            echo "O checkout de main nao corresponde ao commit validado."
            exit 1
          fi

      - name: Sincronizar /srv/doit/prod/app com codigo do main
        run: |
          install -d /srv/doit/prod/app
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='apps/web/.env.local' \
            --exclude='node_modules' \
            --exclude='apps/web/node_modules' \
            --exclude='.next' \
            --exclude='apps/web/.next' \
            "$GITHUB_WORKSPACE/" /srv/doit/prod/app/

      - name: Executar script de deploy
        run: bash /srv/doit/prod/app/scripts/deploy.sh prod

      - name: Criar tag de release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '.')
            const tag = `prod-${date}-r${{ github.run_number }}`
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: '${{ needs.resolve-sha.outputs.sha }}',
            })
            core.notice(`Tag criada: ${tag}`)
