name: Deploy PROD

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: doit-deploy-prod
  cancel-in-progress: false

jobs:
  quality:
    name: Quality Gate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @doit/web exec tsc --noEmit
      - run: bash scripts/lint-incremental.sh
      - run: bash scripts/with-build-env.sh prod corepack pnpm --filter @doit/web build

  security:
    name: Security Gate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm audit --audit-level high

  promote:
    name: Promote dev to main
    needs: [quality, security]
    runs-on: self-hosted
    outputs:
      sha: ${{ steps.promote.outputs.sha }}
    steps:
      - name: Checkout branch dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Promover dev para main
        id: promote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy PROD
    needs: promote
    runs-on: self-hosted

    steps:
      - name: Checkout branch main para PROD
        uses: actions/checkout@v4
        with:
          ref: main
          clean: true

      - name: Validar commit promovido
        run: |
          if [ "$(git rev-parse HEAD)" != "${{ needs.promote.outputs.sha }}" ]; then
            echo "O checkout de main nao corresponde ao commit promovido de dev."
            exit 1
          fi

      - name: Sincronizar /srv/doit/prod/app com codigo do main
        run: |
          install -d /srv/doit/prod/app
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='apps/web/.env.local' \
            --exclude='node_modules' \
            --exclude='apps/web/node_modules' \
            --exclude='.next' \
            --exclude='apps/web/.next' \
            "$GITHUB_WORKSPACE/" /srv/doit/prod/app/

      - name: Executar script de deploy
        run: bash /srv/doit/prod/app/scripts/deploy.sh prod

      - name: Criar tag de release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '.')
            const tag = `prod-${date}-r${{ github.run_number }}`
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: '${{ needs.promote.outputs.sha }}',
            })
            core.notice(`Tag criada: ${tag}`)
