name: Deploy PROD

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "deploy" para confirmar o deploy em producao'
        required: true
        default: ''

concurrency:
  group: doit-deploy-prod
  cancel-in-progress: false

jobs:
  validate:
    name: Confirmar deploy
    runs-on: self-hosted
    steps:
      - name: Checar confirmacao
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Confirmacao invalida. Digite exatamente 'deploy'."
            exit 1
          fi
          echo "Confirmado por: ${{ github.actor }}"

  quality:
    name: Quality Gate
    needs: validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @doit/web exec tsc --noEmit
      - run: bash scripts/lint-incremental.sh
      - run: bash scripts/with-build-env.sh prod corepack pnpm --filter @doit/web build

  security:
    name: Security Gate
    needs: validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - run: corepack prepare pnpm@9.0.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm audit --audit-level high

  deploy:
    name: Deploy PROD
    needs: [quality, security]
    runs-on: self-hosted

    steps:
      - name: Checkout branch dev para PROD
        uses: actions/checkout@v4
        with:
          ref: dev
          clean: true

      - name: Sincronizar /srv/doit/prod/app com codigo do checkout
        run: |
          sudo install -d -o salomao -g salomao /srv/doit/prod/app
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='apps/web/.env.local' \
            --exclude='node_modules' \
            --exclude='apps/web/node_modules' \
            --exclude='.next' \
            --exclude='apps/web/.next' \
            "$GITHUB_WORKSPACE/" /srv/doit/prod/app/

      - name: Executar script de deploy
        run: bash /srv/doit/prod/app/scripts/deploy.sh prod

      - name: Criar tag de release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '.')
            const tag = `prod-${date}-r${{ github.run_number }}`
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            })
            core.notice(`Tag criada: ${tag}`)
